<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>Multi-LLM Interface</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/styles/tooltips.css" />
  <style>
    html {
      background-color: #1a1a2e;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background-color: #1a1a2e;
      color: #e0e0e0;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    #prompt-area {
      background-color: #1a1a2e !important;
      color: #e0e0e0 !important;
    }

    #prompt-input {
      background-color: #16213e !important;
      color: #e0e0e0 !important;
      border: 2px solid #0f3460 !important;
    }

    #dropdown-button,
    .prompt-select,
    .model-select,
    .diff-select,
    .theme-toggle,
    .new-chat-toggle,
    .send-button {
      background-color: #16213e !important;
      color: #e0e0e0 !important;
      border-color: #1f3a5f !important;
    }

    .dropdown-content {
      background-color: #16213e !important;
      border-color: #1f3a5f !important;
    }

    .dropdown-item {
      background-color: transparent !important;
      color: #e0e0e0 !important;
    }

    #no-chats-header {
      color: #94a3b8 !important;
    }
  </style>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding-bottom: 260px;
      position: relative;
      overflow: auto;
    }

    #no-chats-header {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 20px;
      font-weight: 500;
      color: #999;
      text-align: center;
      pointer-events: none;
      z-index: 1;
      letter-spacing: 0.5px;
    }

    #prompt-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 20px;
      height: auto;
      padding: 24px;
      min-height: 120px;
      /* Reduced from 200px */
      z-index: 9999;
    }

    #prompt-area.dark-mode {
      background-color: #1a1a2e;
      color: #e0e0e0;
      box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.3);
    }

    #prompt-area:not(.dark-mode) {
      background-color: #ffffff !important;
      color: #1a1a2e !important;
      box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.08);
    }

    #prompt-input {
      padding: 20px;
      font-size: 16px;
      font-family: 'Outfit', sans-serif;
      line-height: 1.6;
      width: 100%;
      height: 100%;
      border-radius: 12px;
      resize: none;
    }

    #prompt-area.dark-mode #prompt-input {
      background-color: #16213e;
      color: #e0e0e0;
      border: 2px solid #0f3460;
    }

    #prompt-input:focus {
      outline: none;
      border-color: #4a90e2 !important;
      box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
    }

    #prompt-area:not(.dark-mode) #prompt-input {
      background-color: #f8fafc !important;
      color: #1a1a2e !important;
      border: 2px solid #e2e8f0 !important;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      width: 200px;
      gap: 12px;
      justify-content: center;
      /* Center buttons vertically */
    }

    .theme-toggle,
    .new-chat-toggle,
    .send-button {
      width: 44px;
      height: 44px;
      font-size: 20px;
      padding: 0;
      border-radius: 12px;
      align-self: center;
      /* removed auto margin-top */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dropdown,
    .prompt-picker,
    .model-picker,
    .diff {
      width: 100%;
      position: relative;
    }

    #dropdown-button,
    .prompt-select,
    .model-select,
    .diff-select,
    .theme-toggle,
    .new-chat-toggle,
    .send-button {
      width: 100%;
      height: 48px;
      font-size: 14px;
      font-weight: 600;
      padding: 0 16px;
      border: 2px solid;
      border-radius: 10px;
      background-color: #f8fafc;
      color: #475569;
      cursor: pointer;
      box-sizing: border-box;
      display: block;
      text-align: center;
    }

    #dropdown-button,
    .prompt-select,
    .model-select,
    .diff-select {
      text-align: left;
      justify-content: flex-start;
    }

    #prompt-area.dark-mode #dropdown-button,
    #prompt-area.dark-mode .prompt-select,
    #prompt-area.dark-mode .model-select,
    #prompt-area.dark-mode .diff-select,
    #prompt-area.dark-mode .theme-toggle,
    #prompt-area.dark-mode .new-chat-toggle,
    #prompt-area.dark-mode .send-button {
      background-color: #16213e;
      color: #e0e0e0;
      border-color: #1f3a5f;
    }

    #prompt-area.dark-mode #dropdown-button:hover,
    #prompt-area.dark-mode .prompt-select:hover,
    #prompt-area.dark-mode .model-select:hover,
    #prompt-area.dark-mode .diff-select:hover,
    #prompt-area.dark-mode .theme-toggle:hover,
    #prompt-area.dark-mode .new-chat-toggle:hover,
    #prompt-area.dark-mode .send-button:hover {
      background-color: #1e3a5f;
      border-color: #4a90e2;
    }

    #prompt-area:not(.dark-mode) #dropdown-button,
    #prompt-area:not(.dark-mode) .prompt-select,
    #prompt-area:not(.dark-mode) .model-select,
    #prompt-area:not(.dark-mode) .diff-select,
    #prompt-area:not(.dark-mode) .theme-toggle,
    #prompt-area:not(.dark-mode) .new-chat-toggle,
    #prompt-area:not(.dark-mode) .send-button {
      background-color: #f8fafc !important;
      color: #475569 !important;
      border-color: #cbd5e1 !important;
    }

    #prompt-area:not(.dark-mode) #dropdown-button:hover,
    #prompt-area:not(.dark-mode) .prompt-select:hover,
    #prompt-area:not(.dark-mode) .model-select:hover,
    #prompt-area:not(.dark-mode) .diff-select:hover,
    #prompt-area:not(.dark-mode) .theme-toggle:hover,
    #prompt-area:not(.dark-mode) .new-chat-toggle:hover,
    #prompt-area:not(.dark-mode) .send-button:hover {
      background-color: #e2e8f0 !important;
      border-color: #94a3b8 !important;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      top: 100%;
      /* Open downwards */
      left: 0;
      width: 100%;
      background-color: #ffffff;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 8px;
      max-height: 150px;
      /* Limit height to fit better */
      overflow-y: auto;
      z-index: 1000;
      margin-top: 8px;
      /* Spacing from button */
    }

    .dropdown-item {
      width: 100%;
      padding: 12px 16px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-weight: 500;
      font-size: 14px;
      border-radius: 8px;
      margin: 0;
      margin-bottom: 4px;
      color: #475569;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.active {
      background-color: #10b981;
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.4);
    }

    .status-dot.inactive {
      background-color: #ef4444;
      opacity: 0.6;
    }

    .dropdown-item:hover {
      background-color: #f1f5f9;
      color: #1a1a2e;
    }

    #prompt-area.dark-mode .dropdown-content {
      background-color: #16213e;
      border-color: #1f3a5f;
    }

    #prompt-area.dark-mode .dropdown-item {
      background-color: transparent;
      color: #e0e0e0;
    }

    #prompt-area.dark-mode .dropdown-item:hover {
      background-color: #1e3a5f;
      color: #ffffff;
    }

    #prompt-area:not(.dark-mode) .dropdown-content {
      background-color: #ffffff !important;
      border-color: #e2e8f0 !important;
    }

    #prompt-area:not(.dark-mode) .dropdown-item {
      background-color: transparent !important;
      color: #475569 !important;
    }

    #prompt-area:not(.dark-mode) .dropdown-item:hover {
      background-color: #f1f5f9 !important;
      color: #1a1a2e !important;
    }

    body:not(.dark-mode) #no-chats-header {
      color: #94a3b8 !important;
    }

    #char-counter {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter",
        Roboto, sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
    }

    .prompt-picker,
    .model-picker {
      margin: 0;
    }

    .show {
      display: block;
      /* position: absolute; should not override relative positioning of container if used differently */
    }
  </style>
  <script type="module" src="./dist/renderer.js"></script>
</head>

<body>
  <!-- Move the header outside prompt-area and give it an ID -->
  <h2 id="no-chats-header">No Chats Shown. Please add a Chat</h2>

  <div id="prompt-area">
    <div style="position: relative; width: 100%; height: 100%">
      <textarea id="prompt-input" rows="3" placeholder="Press Ctrl + Enter to send prompt"></textarea>
      <div id="char-counter" style="
            position: absolute;
            bottom: 5px;
            right: 10px;
            font-size: 12px;
            opacity: 0.6;
            pointer-events: none;
          ">
        0 chars / 0 words
      </div>
    </div>
    <div style="
          display: flex;
          flex-direction: column;
          gap: 10px;
          align-items: center;
          justify-content: center; /* Center small buttons */
        ">
      <div class="tooltip-container">
        <button class="new-chat-toggle">➕</button>
        <span class="tooltip" role="tooltip">Open New Chat In Displayed Windows</span>
      </div>
      <div class="tooltip-container">
        <button class="theme-toggle" aria-label="Toggle light/dark theme">
          🌙
        </button>
        <span class="tooltip" role="tooltip">Toggle light/dark theme</span>
      </div>
      <div class="tooltip-container">
        <button class="send-button" aria-label="Send prompt to all windows">
          🚀
        </button>
        <span class="tooltip" role="tooltip">Send prompt to all windows</span>
      </div>
    </div>
    <div class="button-group">
      <div class="dropdown">
        <div class="tooltip-container">
          <button id="dropdown-button" aria-label="Show or hide AI model chats">
            Show Models ▼
          </button>
          <span class="tooltip" role="tooltip">Show or hide AI model chats</span>
        </div>
        <div class="dropdown-content">
          <div class="dropdown-item" id="showChatGPT" data-active="false">
            <span class="status-dot inactive"></span>
            <span class="label">ChatGPT</span>
          </div>
          <div class="dropdown-item" id="showGemini" data-active="false">
            <span class="status-dot inactive"></span>
            <span class="label">Gemini</span>
          </div>
          <div class="dropdown-item" id="showClaude" data-active="false">
            <span class="status-dot inactive"></span>
            <span class="label">Claude</span>
          </div>
          <div class="dropdown-item" id="showGrok" data-active="false">
            <span class="status-dot inactive"></span>
            <span class="label">Grok</span>
          </div>
          <div class="dropdown-item" id="showDeepSeek" data-active="false">
            <span class="status-dot inactive"></span>
            <span class="label">DeepSeek</span>
          </div>
          <div class="dropdown-item" id="showCopilot" data-active="false">
            <span class="status-dot inactive"></span>
            <span class="label">Copilot</span>
          </div>
        </div>
      </div>
      <div class="prompt-picker">
        <div class="tooltip-container">
          <button class="prompt-select" aria-label="Choose from saved prompts">
            Select Prompts
          </button>
          <span class="tooltip" role="tooltip">Choose from saved prompts</span>
        </div>
      </div>
      <div class="model-picker">
        <div class="tooltip-container">
          <button class="model-select" aria-label="Configure default AI models">
            Default Models
          </button>
          <span class="tooltip" role="tooltip">Configure default AI models</span>
        </div>
      </div>
    </div>
  </div>
</body>
<script type="module" src="./dist/dropdown.js"></script>

</html>
