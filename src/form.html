<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Prompt Templates</title>
    <link rel="stylesheet" href="styles/tooltips.css" />
    <style>
      /* Critical CSS - Prevent white flash by defaulting to dark theme */
      html {
        background-color: #0d1117;
      }
      body {
        background-color: #0d1117;
        color: #e6edf3;
        margin: 0;
        padding: 0;
      }
      .form-container {
        background-color: #161b22 !important;
      }
      .form-container h1,
      .form-container h2 {
        color: #e6edf3 !important;
      }
      .form-container textarea {
        background-color: #0d1117 !important;
        color: #e6edf3 !important;
        border-color: #30363d !important;
      }
    </style>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
        overflow-x: hidden;
        background-color: #0d1117;
      }
      body.dark-mode {
        background-color: #0d1117;
        color: #e6edf3;
      }
      body.light-mode {
        background-color: #ffffff;
        color: #24292f;
      }
      body.light-mode .form-container {
        background-color: #ffffff !important;
      }
      body.light-mode .form-container h1,
      body.light-mode .form-container h2 {
        color: #24292f !important;
      }
      body.light-mode .form-container textarea {
        background-color: #ffffff !important;
        color: #24292f !important;
        border-color: #d0d7de !important;
      }
      .form-container {
        background-color: #161b22;
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        width: 100%;
        height: 100%;
        max-width: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        border: 1px solid #30363d;
      }
      body.dark-mode .form-container {
        background-color: #161b22;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      }
      h1,
      h2 {
        color: #e6edf3;
        margin-bottom: 16px;
        font-size: 20px;
        font-weight: 600;
        text-align: center;
      }
      body.dark-mode h1,
      body.dark-mode h2 {
        color: #e6edf3;
      }
      .instructions {
        margin-bottom: 20px;
        padding: 12px 16px;
        background-color: #1f3a5f;
        border-left: 3px solid #388bfd;
        color: #8cb4ff;
        border-radius: 6px;
        width: 90%;
        text-align: left;
        font-size: 14px;
      }
      body.dark-mode .instructions {
        background-color: #1f3a5f;
        color: #8cb4ff;
        border-color: #388bfd;
      }
      body.light-mode .instructions {
        background-color: #ddf4ff;
        color: #0969da;
        border-color: #0969da;
      }
      form,
      #prompt-picker {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        width: 90%;
      }
      textarea {
        width: 100%;
        min-height: 180px;
        padding: 14px;
        border: 1px solid #30363d;
        border-radius: 8px;
        font-size: 14px;
        resize: vertical;
        font-family: inherit;
        line-height: 1.6;
        margin: 12px 0;
        background-color: #0d1117;
        color: #e6edf3;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      body.dark-mode textarea {
        background-color: #0d1117;
        color: #e6edf3;
        border-color: #30363d;
      }
      textarea:focus {
        outline: none;
        border-color: #388bfd;
        box-shadow: 0 0 0 3px rgba(56, 139, 253, 0.3);
      }
      body.light-mode textarea:focus {
        border-color: #0969da;
        box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.15);
      }
      button {
        background-color: #238636;
        color: #ffffff;
        padding: 10px 20px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.2s;
        width: 50%;
        min-width: 140px;
      }
      button:hover {
        background-color: #2da44e;
      }
      button:active {
        transform: scale(0.98);
      }
      button:disabled {
        background-color: #21262d;
        color: #484f58;
        cursor: not-allowed;
      }
      body.light-mode button:disabled {
        background-color: #d0d7de;
        color: #8b949e;
      }
      .prompt-table {
        max-height: 280px;
        overflow-y: auto;
        display: block;
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        border-radius: 8px;
        border: 1px solid #30363d;
        overflow: hidden;
      }
      body.light-mode .prompt-table {
        border-color: #d0d7de;
      }
      .prompt-table tr {
        display: table;
        width: 100%;
        table-layout: fixed;
      }
      .prompt-table th,
      .prompt-table td {
        border-bottom: 1px solid #30363d;
        padding: 12px;
        text-align: left;
        background-color: #161b22;
      }
      body.light-mode .prompt-table th,
      body.light-mode .prompt-table td {
        border-color: #d0d7de;
        background-color: #ffffff;
      }
      .prompt-table th {
        background-color: #21262d;
        font-weight: 600;
        font-size: 13px;
        color: #8b949e;
      }
      body.light-mode .prompt-table th {
        background-color: #f6f8fa;
        color: #57606a;
      }
      .prompt-table td {
        position: relative;
        width: 100%;
        word-wrap: break-word;
        font-size: 14px;
      }
      .row-actions {
        position: absolute;
        top: 50%;
        right: 8px;
        transform: translateY(-50%);
        display: none;
        gap: 6px;
      }
      .prompt-table tr:hover .row-actions {
        display: flex;
      }
      .edit-button,
      .delete-button {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 14px;
        padding: 6px 8px;
        border-radius: 4px;
        transition: background-color 0.2s;
      }
      .edit-button:hover {
        background-color: #1f3a5f;
      }
      .delete-button:hover {
        background-color: #5a1d1d;
      }
      .prompt-table tr.selected {
        background-color: #1a3a5f;
      }
      body.dark-mode .prompt-table tr.selected {
        background-color: #1a3a5f;
      }
      body.light-mode .prompt-table tr.selected {
        background-color: #ddf4ff;
      }
      .prompt-table tr:hover {
        background-color: #21262d;
        cursor: pointer;
      }
      body.dark-mode .prompt-table tr:hover {
        background-color: #21262d;
      }
      body.light-mode .prompt-table tr:hover {
        background-color: #f6f8fa;
      }
      body.light-mode .edit-button:hover {
        background-color: #ddf4ff;
      }
      body.light-mode .delete-button:hover {
        background-color: #ffebe9;
      }
      .choose-prompt-button {
        background-color: #388bfd;
      }
      .choose-prompt-button:hover {
        background-color: #4493f0;
      }
      .tooltip-container {
        position: relative;
      }
      .tooltip-container .tooltip {
        visibility: hidden;
        background-color: #6e7681;
        color: #ffffff;
        text-align: center;
        padding: 6px 10px;
        border-radius: 6px;
        position: absolute;
        z-index: 1001;
        bottom: 125%;
        left: 50%;
        transform: translateX(-50%);
        font-size: 12px;
        white-space: nowrap;
        opacity: 0;
        transition: opacity 0.2s;
      }
      .tooltip-container:hover .tooltip {
        visibility: visible;
        opacity: 1;
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #161b22;
      }
      ::-webkit-scrollbar-thumb {
        background: #30363d;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #484f58;
      }
    </style>
  </head>
  <body>
    <div class="form-container">
      <h2>Existing Prompts</h2>
      <div class="instructions">
        Select an existing prompt from the table below or create a new prompt
        template.
      </div>
      <div id="prompt-picker" class="prompt-picker">
        <table class="prompt-table"></table>
        <div class="tooltip-container">
          <button
            class="choose-prompt-button"
            disabled
            aria-label="Select a prompt to use"
          >
            Choose Prompt
          </button>
          <span class="tooltip" role="tooltip">Select a prompt to use</span>
        </div>
      </div>
      <h2 style="text-align: center">Create Prompt Template</h2>
      <form id="form">
        <textarea
          id="template-content"
          placeholder="Enter your favorite prompt template here..."
          spellcheck="true"
          style="display: block; margin: 0 auto"
        ></textarea>
        <div class="tooltip-container">
          <button type="submit" disabled aria-label="Save your prompt template">
            Save Template
          </button>
          <span class="tooltip" role="tooltip">Save your prompt template</span>
        </div>
      </form>
    </div>
    <script src="../dist/save_prompt.js"></script>
  </body>
</html>
