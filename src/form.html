<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Prompt Templates</title>
    <link rel="stylesheet" href="styles/tooltips.css" />
    <style>
      html {
        background-color: #1a1a2e;
      }
      body {
        background-color: #1a1a2e;
        color: #e0e0e0;
        margin: 0;
        padding: 0;
      }
      .form-container {
        background-color: #1a1a2e !important;
        color: #e0e0e0 !important;
      }
      .form-container h1,
      .form-container h2 {
        color: #e0e0e0 !important;
      }
      .form-container textarea {
        background-color: #16213e !important;
        color: #e0e0e0 !important;
        border-color: #1f3a5f !important;
      }
    </style>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter",
          Roboto, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
        overflow-x: hidden;
      }

      body.dark-mode {
        background-color: #1a1a2e;
        color: #e0e0e0;
      }

      body.light-mode {
        background-color: #f1f5f9;
        color: #1a1a2e;
      }

      body.light-mode .form-container {
        background-color: white !important;
        color: #1a1a2e !important;
      }

      body.light-mode .form-container h1,
      body.light-mode .form-container h2 {
        color: #1a1a2e !important;
      }

      body.light-mode .form-container textarea {
        background-color: #f8fafc !important;
        color: #1a1a2e !important;
        border-color: #e2e8f0 !important;
      }

      .form-container {
        background-color: white;
        padding: 32px;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        width: 100%;
        height: 100%;
        max-width: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
      }

      body.dark-mode .form-container {
        background-color: #1a1a2e;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      }

      h1 {
        color: #1a1a2e;
        margin-bottom: 24px;
        font-size: 28px;
        font-weight: 700;
        text-align: center;
      }

      body.dark-mode h1 {
        color: #e0e0e0;
      }

      h2 {
        color: #1a1a2e;
        margin-bottom: 20px;
        font-size: 22px;
        font-weight: 600;
        text-align: center;
      }

      body.dark-mode h2 {
        color: #e0e0e0;
      }

      .instructions {
        margin-bottom: 24px;
        padding: 16px;
        background-color: #f0f9ff;
        border-left: 4px solid #4a90e2;
        color: #1a5490;
        width: 90%;
        text-align: left;
        border-radius: 0 8px 8px 0;
        font-size: 14px;
        font-weight: 500;
      }

      body.dark-mode .instructions {
        background-color: #0f2744;
        color: #7eb8ff;
      }

      body.light-mode .instructions {
        background-color: #f0f9ff;
        color: #1a5490;
      }

      form,
      #prompt-picker {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        width: 90%;
      }

      textarea {
        width: 100%;
        min-height: 200px;
        padding: 16px;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-size: 15px;
        resize: vertical;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter",
          Roboto, sans-serif;
        line-height: 1.6;
        margin: 0;
        background-color: #f8fafc;
        color: #1a1a2e;
      }

      body.dark-mode textarea {
        background-color: #16213e;
        color: #e0e0e0;
        border-color: #1f3a5f;
      }

      textarea:focus {
        outline: none;
        border-color: #4a90e2;
        box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
      }

      button {
        background-color: #4a90e2;
        color: white;
        padding: 14px 28px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        width: 50%;
        min-width: 160px;
      }

      button:hover {
        background-color: #3a7bc8;
      }

      button:active {
        transform: scale(0.98);
      }

      button:disabled {
        background-color: #cbd5e1;
        color: #64748b;
        cursor: not-allowed;
      }

      .prompt-table {
        max-height: 350px;
        overflow-y: auto;
        display: block;
        width: 100%;
        border-collapse: collapse;
        overflow-x: hidden;
        border-radius: 8px;
      }

      .prompt-table tr {
        display: table;
        width: 100%;
        table-layout: fixed;
      }

      .prompt-table th,
      .prompt-table td {
        border: 1px solid #e2e8f0;
        padding: 14px;
        text-align: left;
      }

      body.dark-mode .prompt-table th,
      body.dark-mode .prompt-table td {
        border-color: #1f3a5f;
      }

      .prompt-table td {
        position: relative;
        width: 100%;
        word-wrap: break-word;
        text-align: left;
        padding: 14px;
        border: 1px solid #e2e8f0;
        font-size: 14px;
      }

      body.dark-mode .prompt-table td {
        border-color: #1f3a5f;
      }

      .row-actions {
        position: absolute;
        top: 50%;
        right: 12px;
        transform: translateY(-50%);
        display: none;
        gap: 6px;
      }

      .prompt-table tr:hover .row-actions {
        display: flex;
      }

      .edit-button,
      .delete-button {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 16px;
        padding: 6px;
        border-radius: 6px;
      }

      .edit-button:hover {
        background-color: #dbeafe;
      }

      .delete-button:hover {
        background-color: #fee2e2;
      }

      .prompt-table tr.selected {
        background-color: #dbeafe;
      }

      body.dark-mode .prompt-table tr.selected {
        background-color: #1e3a5f;
      }

      .prompt-table tr:hover {
        background-color: #f8fafc;
        cursor: pointer;
      }

      body.dark-mode .prompt-table tr:hover {
        background-color: #16213e;
      }

      .choose-prompt-button:hover {
        background-color: #3a7bc8;
      }

      .choose-prompt-button:active {
        transform: scale(0.98);
      }
    </style>
  </head>
  <body>
    <div class="form-container">
      <h2>Existing Prompts</h2>
      <div class="instructions">
        Select an existing prompt from the table below or create a new prompt
        template.
      </div>
      <div id="prompt-picker" class="prompt-picker">
        <table class="prompt-table"></table>
        <div class="tooltip-container">
          <button
            class="choose-prompt-button"
            disabled
            aria-label="Select a prompt to use"
          >
            Choose Prompt
          </button>
          <span class="tooltip" role="tooltip">Select a prompt to use</span>
        </div>
      </div>
      <h2 style="text-align: center">Create Prompt Template</h2>
      <form id="form">
        <textarea
          id="template-content"
          placeholder="Enter your favorite prompt template here..."
          spellcheck="true"
          style="display: block; margin: 0 auto"
        ></textarea>
        <div class="tooltip-container">
          <button type="submit" disabled aria-label="Save your prompt template">
            Save Template
          </button>
          <span class="tooltip" role="tooltip">Save your prompt template</span>
        </div>
      </form>
    </div>
    <script src="../dist/save_prompt.js"></script>
  </body>
</html>
