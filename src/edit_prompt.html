<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Edit Prompt</title>
    <link rel="stylesheet" href="styles/tooltips.css" />
    <style>
      /* Critical CSS - Prevent white flash by defaulting to dark theme */
      html {
        background-color: #0d1117;
      }
      body {
        background-color: #0d1117;
        color: #e6edf3;
        margin: 0;
        padding: 0;
      }
      .form-container {
        background-color: #161b22 !important;
        border: 1px solid #30363d !important;
      }
      .form-container h2 {
        color: #e6edf3 !important;
      }
      .form-container textarea {
        background-color: #0d1117 !important;
        color: #e6edf3 !important;
        border-color: #30363d !important;
      }
    </style>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #0d1117;
      }
      body.dark-mode {
        background-color: #0d1117;
        color: #e6edf3;
      }
      body.light-mode {
        background-color: #ffffff;
        color: #24292f;
      }
      body.light-mode .form-container {
        background-color: #ffffff !important;
        border-color: #d0d7de !important;
      }
      body.light-mode .form-container h2 {
        color: #24292f !important;
      }
      body.light-mode .form-container textarea {
        background-color: #ffffff !important;
        color: #24292f !important;
        border-color: #d0d7de !important;
      }
      .form-container {
        background-color: #161b22;
        padding: 28px;
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        width: 90%;
        max-width: 420px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        border: 1px solid #30363d;
      }
      body.dark-mode .form-container {
        background-color: #161b22;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      }
      h2 {
        color: #e6edf3;
        margin-bottom: 20px;
        font-size: 20px;
        font-weight: 600;
        text-align: center;
      }
      body.dark-mode h2 {
        color: #e6edf3;
      }
      form {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        width: 100%;
      }
      textarea {
        width: 100%;
        min-height: 180px;
        padding: 14px;
        border: 1px solid #30363d;
        border-radius: 8px;
        font-size: 14px;
        resize: vertical;
        font-family: inherit;
        line-height: 1.6;
        margin: 12px 0;
        background-color: #0d1117;
        color: #e6edf3;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      body.dark-mode textarea {
        background-color: #0d1117;
        color: #e6edf3;
        border-color: #30363d;
      }
      textarea:focus {
        outline: none;
        border-color: #388bfd;
        box-shadow: 0 0 0 3px rgba(56, 139, 253, 0.3);
      }
      body.light-mode textarea:focus {
        border-color: #0969da;
        box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.15);
      }
      button {
        background-color: #388bfd;
        color: #ffffff;
        padding: 12px 24px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        width: 50%;
        min-width: 140px;
      }
      button:hover {
        background-color: #4493f0;
      }
      button:active {
        transform: scale(0.98);
      }
      .tooltip-container {
        position: relative;
        width: 100%;
        display: flex;
        justify-content: center;
      }
      .tooltip-container .tooltip {
        visibility: hidden;
        background-color: #6e7681;
        color: #ffffff;
        text-align: center;
        padding: 6px 10px;
        border-radius: 6px;
        position: absolute;
        z-index: 1001;
        bottom: 125%;
        left: 50%;
        transform: translateX(-50%);
        font-size: 12px;
        white-space: nowrap;
        opacity: 0;
        transition: opacity 0.2s;
      }
      .tooltip-container:hover .tooltip {
        visibility: visible;
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="form-container">
      <h2 style="text-align: center">Edit Prompt</h2>
      <form id="form">
        <textarea
          id="template-content"
          placeholder="Enter your prompt template here..."
          spellcheck="true"
        ></textarea>
        <div class="tooltip-container">
          <button type="submit" aria-label="Save changes to this prompt">
            Save Prompt
          </button>
          <span class="tooltip" role="tooltip"
            >Save changes to this prompt</span
          >
        </div>
      </form>
    </div>
    <script src="../dist/save_edited_prompt.js"></script>
  </body>
</html>
