<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Edit Prompt</title>
    <link rel="stylesheet" href="styles/tooltips.css" />
    <style>
      html {
        background-color: #1a1a2e;
      }
      body {
        background-color: #1a1a2e;
        color: #e0e0e0;
        margin: 0;
        padding: 0;
      }
      .form-container {
        background-color: #1a1a2e !important;
        color: #e0e0e0 !important;
      }
      .form-container h2 {
        color: #e0e0e0 !important;
      }
      .form-container textarea {
        background-color: #16213e !important;
        color: #e0e0e0 !important;
        border-color: #1f3a5f !important;
      }
    </style>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter",
          Roboto, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      body.dark-mode {
        background-color: #1a1a2e;
        color: #e0e0e0;
      }

      body.light-mode {
        background-color: #f1f5f9;
        color: #1a1a2e;
      }

      body.light-mode .form-container {
        background-color: white !important;
        color: #1a1a2e !important;
      }

      body.light-mode .form-container h2 {
        color: #1a1a2e !important;
      }

      body.light-mode .form-container textarea {
        background-color: #f8fafc !important;
        color: #1a1a2e !important;
        border-color: #e2e8f0 !important;
      }

      .form-container {
        background-color: white;
        padding: 32px;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        width: 100%;
        height: 100%;
        max-width: 450px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
      }

      body.dark-mode .form-container {
        background-color: #1a1a2e;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      }

      h2 {
        color: #1a1a2e;
        margin-bottom: 24px;
        font-size: 24px;
        font-weight: 700;
        text-align: center;
      }

      body.dark-mode h2 {
        color: #e0e0e0;
      }

      form {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        width: 100%;
      }

      textarea {
        width: 100%;
        max-width: 380px;
        min-height: 200px;
        padding: 16px;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-size: 15px;
        resize: vertical;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter",
          Roboto, sans-serif;
        line-height: 1.6;
        margin: 0;
        background-color: #f8fafc;
        color: #1a1a2e;
      }

      body.dark-mode textarea {
        background-color: #16213e;
        color: #e0e0e0;
        border-color: #1f3a5f;
      }

      textarea:focus {
        outline: none;
        border-color: #4a90e2;
        box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
      }

      button {
        background-color: #4a90e2;
        color: white;
        padding: 14px 28px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        width: 50%;
        min-width: 160px;
      }

      button:hover {
        background-color: #3a7bc8;
      }

      button:active {
        transform: scale(0.98);
      }

      button:disabled {
        background-color: #cbd5e1;
        color: #64748b;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="form-container">
      <h2 style="text-align: center">Edit Prompt</h2>
      <form id="form">
        <textarea
          id="template-content"
          placeholder="Enter your prompt template here..."
          spellcheck="true"
        ></textarea>
        <div class="tooltip-container">
          <button type="submit" aria-label="Save changes to this prompt">
            Save Prompt
          </button>
          <span class="tooltip" role="tooltip"
            >Save changes to this prompt</span
          >
        </div>
      </form>
    </div>
    <script src="../dist/save_edited_prompt.js"></script>
  </body>
</html>
