<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline';"
    />
    <title>Select Default Models</title>
    <link rel="stylesheet" href="styles/tooltips.css" />
    <style>
      /* Critical CSS - Prevent white flash by defaulting to dark theme */
      html {
        background-color: #0d1117;
      }
      body {
        background-color: #0d1117;
        color: #e6edf3;
        margin: 0;
        padding: 20px;
      }
      h2 {
        color: #e6edf3 !important;
      }
      .instructions {
        background-color: #1f3a5f !important;
        color: #8cb4ff !important;
      }
      .model-list {
        background-color: #161b22 !important;
        border: 1px solid #30363d !important;
      }
      .model-item {
        background-color: #21262d !important;
        border-color: #30363d !important;
      }
      .model-item label {
        color: #e6edf3 !important;
      }
    </style>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 24px;
        background-color: #0d1117;
        overflow-x: hidden;
      }
      body.dark-mode {
        background-color: #0d1117;
        color: #e6edf3;
      }
      body.light-mode {
        background-color: #ffffff;
        color: #24292f;
      }
      body.light-mode h2 {
        color: #24292f !important;
      }
      body.light-mode .instructions {
        background-color: #ddf4ff !important;
        color: #0969da !important;
      }
      body.light-mode .model-list {
        background-color: #ffffff !important;
        border-color: #d0d7de !important;
      }
      body.light-mode .model-item {
        background-color: #f6f8fa !important;
        border-color: #d0d7de !important;
      }
      body.light-mode .model-item label {
        color: #24292f !important;
      }
      h2 {
        margin-bottom: 20px;
        color: #e6edf3;
        font-size: 22px;
        font-weight: 600;
      }
      body.dark-mode h2 {
        color: #e6edf3;
      }
      .instructions {
        margin-bottom: 20px;
        padding: 14px 16px;
        background-color: #1f3a5f;
        border-left: 3px solid #388bfd;
        color: #8cb4ff;
        border-radius: 8px;
        font-size: 14px;
        line-height: 1.5;
      }
      body.dark-mode .instructions {
        background-color: #1f3a5f;
        color: #8cb4ff;
        border-color: #388bfd;
      }
      .model-list {
        background-color: #161b22;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        margin-bottom: 24px;
        border: 1px solid #30363d;
      }
      body.dark-mode .model-list {
        background-color: #161b22;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
      }
      .model-item {
        display: flex;
        align-items: center;
        padding: 14px 16px;
        margin-bottom: 10px;
        border: 1px solid #30363d;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
        background-color: #21262d;
      }
      body.dark-mode .model-item {
        border-color: #30363d;
        background-color: #21262d;
      }
      .model-item:hover {
        background-color: #30363d;
        border-color: #388bfd;
        transform: translateX(4px);
      }
      body.light-mode .model-item:hover {
        background-color: #f6f8fa;
        border-color: #0969da;
      }
      .model-item input[type="checkbox"] {
        width: 18px;
        height: 18px;
        margin-right: 14px;
        cursor: pointer;
        accent-color: #388bfd;
      }
      body.light-mode .model-item input[type="checkbox"] {
        accent-color: #0969da;
      }
      .model-item label {
        cursor: pointer;
        font-size: 15px;
        color: #e6edf3;
        user-select: none;
        font-weight: 500;
      }
      body.dark-mode .model-item label {
        color: #e6edf3;
      }
      .button-group {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
        padding-right: 8px;
      }
      button {
        padding: 10px 20px;
        font-size: 14px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 500;
        transition: all 0.2s;
      }
      #save-button {
        background-color: #238636;
        color: #ffffff;
      }
      #save-button:hover {
        background-color: #2da44e;
      }
      #cancel-button {
        background-color: #21262d;
        color: #e6edf3;
        border: 1px solid #30363d;
      }
      #cancel-button:hover {
        background-color: #30363d;
      }
      body.light-mode #cancel-button {
        background-color: #f6f8fa;
        color: #24292f;
        border-color: #d0d7de;
      }
      body.light-mode #cancel-button:hover {
        background-color: #eaeef2;
      }
      .tooltip-container {
        position: relative;
      }
      .tooltip-container .tooltip {
        visibility: hidden;
        background-color: #6e7681;
        color: #ffffff;
        text-align: center;
        padding: 6px 10px;
        border-radius: 6px;
        position: absolute;
        z-index: 1001;
        bottom: 125%;
        left: 50%;
        transform: translateX(-50%);
        font-size: 12px;
        white-space: nowrap;
        opacity: 0;
        transition: opacity 0.2s;
      }
      .tooltip-container:hover .tooltip {
        visibility: visible;
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <h2>Select Default Models</h2>
    <div class="instructions">
      Choose which models should be loaded by default when the application
      starts. You can select multiple models.
    </div>

    <div class="model-list">
      <div class="model-item">
        <input type="checkbox" id="chatgpt" value="https://chatgpt.com" />
        <label for="chatgpt">ChatGPT</label>
      </div>
      <div class="model-item">
        <input type="checkbox" id="gemini" value="https://gemini.google.com" />
        <label for="gemini">Gemini</label>
      </div>
      <div class="model-item">
        <input type="checkbox" id="claude" value="https://claude.ai/chats/" />
        <label for="claude">Claude</label>
      </div>
      <div class="model-item">
        <input type="checkbox" id="grok" value="https://grok.com/" />
        <label for="grok">Grok</label>
      </div>
      <div class="model-item">
        <input
          type="checkbox"
          id="deepseek"
          value="https://chat.deepseek.com/"
        />
        <label for="deepseek">DeepSeek</label>
      </div>
      <div class="model-item">
        <input
          type="checkbox"
          id="copilot"
          value="https://copilot.microsoft.com/"
        />
        <label for="copilot">Microsoft Copilot</label>
      </div>
    </div>

    <div class="button-group">
      <div class="tooltip-container">
        <button id="cancel-button" aria-label="Close without saving changes">
          Cancel
        </button>
        <span class="tooltip" role="tooltip">Close without saving changes</span>
      </div>
      <div class="tooltip-container">
        <button id="save-button" aria-label="Save settings and restart the app">
          Save & Restart
        </button>
        <span class="tooltip" role="tooltip"
          >Save settings and restart the app</span
        >
      </div>
    </div>

    <script type="module" src="../dist/select_models_renderer.js"></script>
  </body>
</html>
