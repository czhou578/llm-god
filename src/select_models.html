<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline';"
    />
    <title>Select Default Models</title>
    <link rel="stylesheet" href="styles/tooltips.css" />
    <style>
      html {
        background-color: #1a1a2e;
      }
      body {
        background-color: #1a1a2e;
        color: #e0e0e0;
        margin: 0;
        padding: 32px;
      }
      h2 {
        color: #e0e0e0 !important;
      }
      .instructions {
        background-color: #0f2744 !important;
        color: #7eb8ff !important;
      }
      .model-list {
        background-color: #1a1a2e !important;
      }
      .model-item {
        background-color: transparent !important;
        border-color: #1f3a5f !important;
      }
      .model-item label {
        color: #e0e0e0 !important;
      }
    </style>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter",
          Roboto, sans-serif;
        padding: 32px;
        overflow-x: hidden;
      }

      body.dark-mode {
        background-color: #1a1a2e;
        color: #e0e0e0;
      }

      body.light-mode {
        background-color: #f1f5f9;
        color: #1a1a2e;
      }

      body.light-mode h2 {
        color: #1a1a2e !important;
      }

      body.light-mode .instructions {
        background-color: #f0f9ff !important;
        color: #1a5490 !important;
      }

      body.light-mode .model-list {
        background-color: white !important;
      }

      body.light-mode .model-item {
        background-color: transparent !important;
        border-color: #e2e8f0 !important;
      }

      body.light-mode .model-item label {
        color: #1a1a2e !important;
      }

      h2 {
        margin-bottom: 24px;
        color: #1a1a2e;
        font-size: 28px;
        font-weight: 700;
      }

      body.dark-mode h2 {
        color: #e0e0e0;
      }

      .instructions {
        margin-bottom: 24px;
        padding: 16px;
        background-color: #f0f9ff;
        border-left: 4px solid #4a90e2;
        color: #1a5490;
        border-radius: 0 8px 8px 0;
        font-size: 14px;
        font-weight: 500;
      }

      body.dark-mode .instructions {
        background-color: #0f2744;
        color: #7eb8ff;
      }

      .model-list {
        background-color: white;
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        margin-bottom: 24px;
      }

      body.dark-mode .model-list {
        background-color: #1a1a2e;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      }

      .model-item {
        display: flex;
        align-items: center;
        padding: 16px;
        margin-bottom: 12px;
        border: 2px solid #e2e8f0;
        border-radius: 10px;
        cursor: pointer;
        background-color: transparent;
      }

      body.dark-mode .model-item {
        border-color: #1f3a5f;
        background-color: transparent;
      }

      .model-item:hover {
        background-color: #f8fafc;
        border-color: #4a90e2;
      }

      body.dark-mode .model-item:hover {
        background-color: #16213e;
        border-color: #4a90e2;
      }

      .model-item input[type="checkbox"] {
        width: 20px;
        height: 20px;
        margin-right: 14px;
        cursor: pointer;
        accent-color: #4a90e2;
      }

      .model-item label {
        cursor: pointer;
        font-size: 15px;
        font-weight: 500;
        color: #1a1a2e;
        user-select: none;
      }

      body.dark-mode .model-item label {
        color: #e0e0e0;
      }

      .button-group {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
        margin-right: 32px;
      }

      button {
        padding: 14px 28px;
        font-size: 15px;
        font-weight: 600;
        border: none;
        border-radius: 10px;
        cursor: pointer;
      }

      #save-button {
        background-color: #4a90e2;
        color: white;
      }

      #save-button:hover {
        background-color: #3a7bc8;
      }

      #cancel-button {
        background-color: #ef4444;
        color: white;
      }

      #cancel-button:hover {
        background-color: #dc2626;
      }
    </style>
  </head>
  <body>
    <h2>Select Default Models</h2>
    <div class="instructions">
      Choose which models should be loaded by default when the application
      starts. You can select multiple models.
    </div>

    <div class="model-list">
      <div class="model-item">
        <input type="checkbox" id="chatgpt" value="https://chatgpt.com" />
        <label for="chatgpt">ChatGPT</label>
      </div>
      <div class="model-item">
        <input type="checkbox" id="gemini" value="https://gemini.google.com" />
        <label for="gemini">Gemini</label>
      </div>
      <div class="model-item">
        <input type="checkbox" id="claude" value="https://claude.ai/chats/" />
        <label for="claude">Claude</label>
      </div>
      <div class="model-item">
        <input type="checkbox" id="grok" value="https://grok.com/" />
        <label for="grok">Grok</label>
      </div>
      <div class="model-item">
        <input
          type="checkbox"
          id="deepseek"
          value="https://chat.deepseek.com/"
        />
        <label for="deepseek">DeepSeek</label>
      </div>
      <div class="model-item">
        <input
          type="checkbox"
          id="copilot"
          value="https://copilot.microsoft.com/"
        />
        <label for="copilot">Microsoft Copilot</label>
      </div>
    </div>

    <div class="button-group">
      <div class="tooltip-container">
        <button id="cancel-button" aria-label="Close without saving changes">
          Cancel
        </button>
        <span class="tooltip" role="tooltip">Close without saving changes</span>
      </div>
      <div class="tooltip-container">
        <button id="save-button" aria-label="Save settings and restart the app">
          Save & Restart
        </button>
        <span class="tooltip" role="tooltip"
          >Save settings and restart the app</span
        >
      </div>
    </div>

    <script type="module" src="../dist/select_models_renderer.js"></script>
  </body>
</html>
